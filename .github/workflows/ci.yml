name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ruff format check
        run: uv run ruff format --check

      - name: Run mypy check
        run: uv run mypy django_components_lite/

      - name: Run ty check
        run: uv run ty check django_components_lite/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
        django-version:
          - "5.2"
        os: [ubuntu-latest, windows-latest]

        include:
          # Django 6.0 (Python 3.14 only for now)
          - python-version: "3.14"
            django-version: "6.0"
            os: ubuntu-latest

          # Pre-release Django
          - python-version: "3.14"
            django-version: "main"
            os: ubuntu-latest

    steps:
      # Configure git to handle long paths (needed for benchmark data on Windows)
      - name: Configure git
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Django ${{ matrix.django-version }}
        run: |
          if [ "${{ matrix.django-version }}" = "main" ]; then
            uv pip install "Django @ git+https://github.com/django/django.git@main"
          else
            uv pip install "Django~=${{ matrix.django-version }}.0"
          fi
        shell: bash

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run tests
        run: uv run pytest -n auto

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13' && matrix.django-version == '5.2' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test_docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: |
          uv sync --group docs
          uv pip install -e .

      - name: Build documentation
        run: uv run mkdocs build --verbose

  test_example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv pip install -e .

      - name: Check example project
        run: |
          cd examples/simple
          PYTHONPATH=. uv run python manage.py check
          uv run python manage.py runserver 8123 & sleep 3
          curl http://127.0.0.1:8123/ || exit 1
