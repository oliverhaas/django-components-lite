{% load component_tags %}
<!DOCTYPE html>
<html>
<head><title>django-components-lite example</title></head>
<body>
  <h1>django-components-lite</h1>

  {% comp "greeting" name="Django" %}{% endcomp %}

  {% comp "greeting" name="World" %}
    {% fill "extra" %}
      <p>This slot was filled by the parent template.</p>
    {% endfill %}
  {% endcomp %}

  {% comp "greeting" %}{% endcomp %}
</body>
</html>
